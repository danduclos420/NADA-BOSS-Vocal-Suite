<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>NADA BOSS ULTIMATE</title>
</head>
<body>
    <div class="plugin-container">
        <!-- HEADER SECTION -->
        <header class="plugin-header">
            <div class="header-left">
                <h1>NADA AUDIO</h1>
                <h2>PRO-VOCALIST SUITE</h2>
                <div class="screw top-left"></div>
            </div>
            
            <div class="ai-master-housing">
                <div class="ai-ring-glow"></div>
                <button class="ai-button-gold" id="btn-nada-ai">
                    <span class="ai-text">NADA</span>
                    <span class="ai-sub-text">AI</span>
                </button>
            </div>

            <div class="header-right">
                <div class="vst-badge">VST3</div>
                <h2>4K RESOLUTION</h2>
                <div class="screw top-right"></div>
            </div>
        </header>

        <!-- MAIN CONTROL GRID -->
        <div class="control-grid">
            
            <!-- SECTION: AUTOTUNE -->
            <section class="module-box autotune">
                <div class="screw top-left small"></div><div class="screw top-right small"></div>
                <div class="module-title">AUTOTUNE</div>
                <div class="module-content">
                    <div class="meter-group">
                        <label class="bebas">SIGNAL</label>
                        <div class="led-meter-v"><div class="led-fill" style="height: 60%"></div></div>
                    </div>
                    
                    <div class="knob-main-group">
                        <div class="knob-hw large"><div class="indicator"></div></div>
                        <label class="bebas">PITCH</label>
                        <div class="knob-hw medium"><div class="indicator"></div></div>
                        <label class="bebas">SPEED</label>
                    </div>

                    <div class="meter-group">
                        <label class="bebas">TUNE</label>
                        <div class="led-meter-v"><div class="led-fill" style="height: 30%"></div></div>
                    </div>
                </div>
                <div class="module-footer">
                    <button class="hw-btn active">SCALE</button>
                    <button class="hw-btn">KEY</button>
                    <button class="hw-btn">TUNE</button>
                </div>
            </section>

            <!-- SECTION: OPTO COMPRESSOR -->
            <section class="module-box opto">
                <div class="screw top-left small"></div><div class="screw top-right small"></div>
                <div class="module-title">OPTO COMPRESSOR</div>
                <div class="module-content horizontal">
                    <div class="knob-main-group">
                        <div class="knob-hw extra-large"><div class="indicator"></div></div>
                        <label class="bebas">PEAK RED.</label>
                    </div>
                    <div class="meter-columns">
                        <div class="led-meter-v mini"><div class="led-fill" style="height: 70%"></div></div>
                        <div class="led-meter-v mini"><div class="led-fill" style="height: 20%"></div></div>
                    </div>
                    <div class="mini-knobs-stack">
                        <div class="knob-hw mini"><div class="indicator"></div></div>
                        <label class="bebas">RATIO</label>
                        <div class="knob-hw mini"><div class="indicator"></div></div>
                        <label class="bebas">GAIN</label>
                    </div>
                </div>
                <div class="module-footer">
                    <div class="hw-switch-led active"></div>
                    <label class="bebas">OPTO</label>
                </div>
            </section>

        </div>
        <div class="screw bottom-left"></div><div class="screw bottom-right"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
