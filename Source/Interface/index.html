<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>NADA BOSS MASTER DESK</title>
</head>
<body>
    <div class="master-desk">
        <!-- TOP NAV -->
        <header class="top-bar">
            <div class="logo-area">
                <h1 class="logo">NADA BOSS</h1>
                <span class="v-tag">V3.0 GOLD // MASTER DESK</span>
            </div>
            <div class="master-controls">
                <button id="btn-master-bypass">BYPASS</button>
                <div class="ai-brain-led">AI ACTIVE</div>
            </div>
        </header>

        <!-- RACK ROW 1: AI & PITCH -->
        <div class="rack-row" id="row-pitch">
            <div class="module-label">AUTOTUNE PRO</div>
            <div class="controls">
                <div class="knob-group">
                    <label>RETUNE SPEED</label>
                    <div class="knob medium" id="knob-speed"><div class="indicator"></div></div>
                </div>
                <div class="selector-group">
                    <select id="sel-key"><option>C</option><option>C#</option><option>D</option></select>
                    <select id="sel-scale"><option>Major</option><option>Minor</option></select>
                </div>
                <div class="led-display" id="display-note">C#</div>
            </div>
        </div>

        <!-- RACK ROW 2: DYNAMICS (1176 / LA-2A) -->
        <div class="rack-row dual" id="row-dynamics">
            <div class="sub-module" id="mod-1176">
                <div class="module-label">1176 FET COMPRESSOR</div>
                <div class="controls">
                    <div class="knob-group">
                        <label>INPUT</label>
                        <div class="knob" id="knob-fet-in"><div class="indicator"></div></div>
                    </div>
                    <div class="ratio-buttons">
                        <button class="active">4</button><button>8</button><button>12</button><button>20</button>
                    </div>
                    <div class="knob-group">
                        <label>OUTPUT</label>
                        <div class="knob" id="knob-fet-out"><div class="indicator"></div></div>
                    </div>
                </div>
            </div>
            <div class="sub-module" id="mod-la2a">
                <div class="module-label">LA-2A OPTO LEVELLER</div>
                <div class="controls">
                    <div class="knob-group">
                        <label>PEAK RED.</label>
                        <div class="knob" id="knob-opto-red"><div class="indicator"></div></div>
                    </div>
                    <div class="knob-group">
                        <label>GAIN</label>
                        <div class="knob" id="knob-opto-gain"><div class="indicator"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RACK ROW 3: TONAL & TEXTURE -->
        <div class="rack-row" id="row-tonal">
             <div class="module-label">TONAL SURGERY & COLOR</div>
             <div class="controls">
                <div class="knob-group"><label>BASS</label><div class="knob mini"><div class="indicator"></div></div></div>
                <div class="knob-group"><label>MID</label><div class="knob mini"><div class="indicator"></div></div></div>
                <div class="knob-group"><label>AIR</label><div class="knob mini"><div class="indicator"></div></div></div>
                <div class="v-divider"></div>
                <div class="knob-group"><label>DE-ESSER</label><div class="knob"><div class="indicator"></div></div></div>
                <div class="knob-group"><label>SSL DRIVE</label><div class="knob"><div class="indicator"></div></div></div>
             </div>
        </div>

        <!-- ANALYZER & MASTER -->
        <footer class="paz-footer">
            <div class="paz-analyzer">
                <canvas id="paz-spectrum"></canvas>
            </div>
            <div class="paz-stereo">
                <canvas id="paz-goniometer"></canvas>
            </div>
            <div class="master-output">
                <div class="vu-meter"><div class="needle" id="needle-master"></div></div>
                <div class="knob" id="knob-limiter"><div class="indicator"></div></div>
                <label>LIMITER</label>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
