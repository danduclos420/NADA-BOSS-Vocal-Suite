<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>NADA BOSS ULTIMATE</title>
</head>
<body>
    <div class="plugin-container">
        <!-- HEADER SECTION -->
        <header class="plugin-header">
            <div class="header-left">
                <h1>NADA AUDIO</h1>
                <h2>PRO-VOCALIST SUITE</h2>
                <span class="sub-font">BEBAS NEUE BOLD</span>
            </div>
            
            <div class="ai-master-housing">
                <div class="ai-ring-glow"></div>
                <button class="ai-button-gold" id="btn-nada-ai">
                    <span class="ai-text">NADA</span>
                    <span class="ai-sub-text">AI</span>
                </button>
            </div>

            <div class="header-right">
                <div class="vst-badge">VST3</div>
                <h2>4K RESOLUTION</h2>
                <span class="sub-font">BEBAS NEUE BOLD</span>
            </div>
        </header>

        <!-- MAIN CONTROL GRID -->
        <div class="control-grid">
            
            <!-- SECTION: AUTOTUNE -->
            <section class="module-box autotune">
                <div class="module-title">AUTOTUNE</div>
                <div class="module-content">
                    <div class="meter-group">
                        <label>SIGNAL</label>
                        <div class="led-meter-v"><div class="led-fill" id="meter-signal"></div></div>
                        <label>SIGNAL</label>
                    </div>
                    
                    <div class="knob-main-group">
                        <div class="knob-hw large" id="knob-pitch"><div class="indicator"></div></div>
                        <label>PITCH</label>
                        <div class="knob-hw medium" id="knob-speed"><div class="indicator"></div></div>
                        <label>SPEED</label>
                    </div>

                    <div class="meter-group">
                        <label>TUNE</label>
                        <div class="led-meter-v"><div class="led-fill" id="meter-tune"></div></div>
                        <label>TUNE</label>
                    </div>
                </div>
                <div class="module-footer">
                    <button class="hw-btn active">SCALE</button>
                    <button class="hw-btn">KEY</button>
                    <button class="hw-btn">TUNE</button>
                </div>
            </section>

            <!-- SECTION: OPTO COMPRESSOR -->
            <section class="module-box opto">
                <div class="module-title">OPTO COMPRESSOR</div>
                <div class="module-content horizontal">
                    <div class="knob-main-group">
                        <div class="knob-hw extra-large" id="knob-opto-red"><div class="indicator"></div></div>
                        <label>PEAK RED.</label>
                    </div>
                    <div class="meter-columns">
                        <div class="led-meter-v mini"><div class="led-fill" id="meter-opto-gr"></div></div>
                        <div class="led-meter-v mini"><div class="led-fill" id="meter-opto-out"></div></div>
                    </div>
                    <div class="mini-knobs-stack">
                        <div class="knob-hw mini"><div class="indicator"></div></div>
                        <label>RATIO</label>
                        <div class="knob-hw mini"><div class="indicator"></div></div>
                        <label>GAIN</label>
                    </div>
                </div>
                <div class="module-footer">
                    <div class="hw-switch-led" id="sw-opto"></div>
                    <label>OPTO</label>
                </div>
            </section>

            <!-- SECTION: FET COMPRESSOR -->
            <section class="module-box fet">
                <div class="module-title">FET COMPRESSOR</div>
                <!-- Complex grid from mockup -->
                <div class="fet-grid">
                     <div class="knob-hw large"><div class="indicator"></div></div>
                     <div class="meter-columns">
                        <div class="led-meter-v"><div class="led-fill"></div></div>
                        <div class="led-meter-v"><div class="led-fill"></div></div>
                     </div>
                     <div class="knob-hw medium"><div class="indicator"></div></div>
                </div>
                <div class="fet-controls-row">
                    <!-- Smaller knobs (Ratio, Attack, Release, Makeup) -->
                </div>
            </section>

            <!-- SECTION: FX BUS -->
            <section class="module-box fx-bus">
                <div class="module-title">FX BUS</div>
                <div class="fx-section">
                    <label>REVERB</label>
                    <div class="knob-hw small"><div class="indicator"></div></div>
                    <div class="led-dot active"></div>
                </div>
                <!-- SAT, DELAY etc -->
            </section>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
