<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>NADA BOSS ULTIMATE</title>
</head>
<body>
    <div class="master-desk">
        <!-- HEADER -->
        <header class="rack-slot" style="height: 60px; padding: 0 20px; border-radius: 0;">
            <div class="logo" style="color:#fff; font-weight:900; font-size:24px;">NADA <span style="color:var(--neon-red)">BOSS</span></div>
            <button class="btn-gold-ai">ACTIVATE NADA IA</button>
            <div class="v-tag" style="font-size:9px; color:#555">ULTIMATE EDITION // MASTERING GRADE</div>
        </header>

        <!-- MAIN RACK -->
        <main class="rack-grid" style="display: grid; grid-template-rows: 1fr 1fr; gap: 4px; padding: 4px;">
            <!-- ROW 1: AUTOTUNE & DYNAMICS -->
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 4px;">
                <div class="rack-slot">
                    <div class="slot-label">Autotune Engine</div>
                    <div class="knob-container">
                        <div class="knob-hw" id="knob-speed"></div>
                        <div class="knob-label">SPEED</div>
                    </div>
                    <div class="selector-container" style="display:flex; flex-direction:column; gap:10px;">
                        <div class="hw-selector" id="sel-key">C#</div>
                        <div class="hw-selector" id="sel-scale">MAJOR</div>
                    </div>
                </div>
                <div class="rack-slot">
                    <div class="slot-label">Precision Dynamics (FET/OPTO)</div>
                    <div class="knob-container"><div class="knob-hw" id="knob-fet-in"></div><div class="knob-label">INPUT</div></div>
                    <div class="knob-container"><div class="knob-hw" id="knob-fet-out"></div><div class="knob-label">OUTPUT</div></div>
                    <div class="knob-container"><div class="knob-hw" id="knob-opto-red"></div><div class="knob-label">OPTO RED</div></div>
                    <div class="vu-display"><div class="vu-bar" id="vu-gr"></div></div>
                </div>
            </div>

            <!-- ROW 2: TONAL & FX -->
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 4px;">
                <div class="rack-slot">
                    <div class="slot-label">Tonal Surgery (EQP-A / SSL)</div>
                    <div class="knob-container"><div class="knob-hw"></div><div class="knob-label">BASS</div></div>
                    <div class="knob-container"><div class="knob-hw"></div><div class="knob-label">MID</div></div>
                    <div class="knob-container"><div class="knob-hw"></div><div class="knob-label">AIR</div></div>
                    <div class="knob-container"><div class="knob-hw"></div><div class="knob-label">SSL DRIVE</div></div>
                    <div class="knob-container"><div class="knob-hw"></div><div class="knob-label">DE-ESSER</div></div>
                </div>
                <div class="rack-slot">
                    <div class="slot-label">Spatial & Time</div>
                    <div class="knob-container"><div class="knob-hw"></div><div class="knob-label">WIDTH</div></div>
                    <div class="knob-container"><div class="knob-hw"></div><div class="knob-label">REVERB</div></div>
                    <div class="knob-container"><div class="knob-hw"></div><div class="knob-label">DELAY</div></div>
                </div>
            </div>
        </main>

        <!-- FOOTER: PAZ ANALYZER -->
        <footer class="rack-slot" style="margin: 0 8px 8px 8px; height: 160px; display: grid; grid-template-columns: 1fr 1fr 150px; gap: 20px;">
            <div class="paz-box" style="background:#000; border:1px solid #333; height:130px;"><canvas id="spec"></canvas></div>
            <div class="paz-box" style="background:#000; border:1px solid #333; height:130px;"><canvas id="gonio"></canvas></div>
            <div class="master-out">
                <div class="knob-container">
                    <div class="knob-hw" style="width:70px; height:70px;"></div>
                    <div class="knob-label">LIMITER</div>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
