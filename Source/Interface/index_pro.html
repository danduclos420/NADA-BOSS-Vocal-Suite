<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_pro.css">
    <title>NADA BOSS [LEGENDARY] PRO</title>
</head>
<body>
    <div class="rack-container">
        <!-- HEADER SECTION -->
        <header class="rack-header">
            <div>
                <h1>NADA AUDIO</h1>
                <h2>PRO-VOCALIST SUITE // ULTIMATE</h2>
            </div>
            
            <div class="ai-centerpiece"></div>

            <div style="text-align: right;">
                <h1>VST3</h1>
                <h2 style="color:var(--neon-red)">4K MASTERING GRADE</h2>
            </div>
        </header>

        <!-- ROW 1: PRE-PROCESSING -->
        <div class="module-row">
            <section class="module autotune">
                <div class="module-title">1. AUTOTUNE CONTROL</div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="led-meter-v"><div class="led-bar" style="height: 60%"></div></div>
                    <div class="knob-container">
                        <div class="knob-pro large"></div>
                        <label>PITCH</label>
                    </div>
                    <div class="knob-container">
                        <div class="knob-pro"></div>
                        <label>SPEED</label>
                    </div>
                </div>
            </section>

            <section class="module eq-mud">
                <div class="module-title">2. REDUCTIVE EQ (MUD)</div>
                <div style="display:flex; justify-content:space-around;">
                    <div class="knob-container"><div class="knob-pro mini"></div><label>FREQ</label></div>
                    <div class="knob-container"><div class="knob-pro"></div><label>DEPTH</label></div>
                </div>
            </section>

            <section class="module fet-1176">
                <div class="module-title">3. FET 1176 COMP</div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="led-meter-v"><div class="led-bar" style="height: 40%"></div></div>
                    <div class="knob-container"><div class="knob-pro"></div><label>THRESH</label></div>
                    <div class="knob-container"><div class="knob-pro mini"></div><label>MAKEUP</label></div>
                </div>
            </section>
        </div>

        <!-- ROW 2: TONE & SURGERY -->
        <div class="module-row">
            <section class="module opto-la2a">
                <div class="module-title">4. OPTO LA-2A LEVEL</div>
                <div style="display:flex; justify-content:space-around;">
                    <div class="knob-container"><div class="knob-pro large" style="transform: rotate(45deg);"></div><label>PEAK RED.</label></div>
                </div>
            </section>

            <section class="module eqp-a">
                <div class="module-title">5. EQP-A AIR SHELF</div>
                <div style="display:flex; justify-content:space-around;">
                    <div class="knob-container"><div class="knob-pro"></div><label>AIR</label></div>
                    <div class="knob-container"><div class="knob-pro"></div><label>WARMTH</label></div>
                </div>
            </section>

            <section class="module deesser">
                <div class="module-title">9. DE-ESSER SSSS</div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="led-meter-v"><div class="led-bar" style="height: 10%; background: #0f0;"></div></div>
                    <div class="knob-container"><div class="knob-pro"></div><label>AMOUNT</label></div>
                </div>
            </section>
        </div>

        <!-- ROW 3: COLOR & FX -->
        <div class="module-row">
             <section class="module ssl-sat">
                <div class="module-title">6 & 7. SSL COLOR & SAT</div>
                <div style="display:flex; justify-content:space-around;">
                    <div class="knob-container"><div class="knob-pro mini"></div><label>SSL</label></div>
                    <div class="knob-container"><div class="knob-pro"></div><label>SAT GRAIN</label></div>
                </div>
            </section>

            <section class="module stereo">
                <div class="module-title">11. STEREO WIDTH</div>
                <div class="knob-container"><div class="knob-pro" style="margin: 0 auto;"></div><label>WIDER</label></div>
            </section>

            <section class="module bus-fx">
                <div class="module-title">13 & 14. BUS EFFECTS</div>
                <div style="display:flex; justify-content:space-around;">
                    <div class="knob-container"><div class="knob-pro"></div><label>REVERB</label></div>
                    <div class="knob-container"><div class="knob-pro"></div><label>DELAY</label></div>
                </div>
            </section>
        </div>

        <!-- FOOTER: MASTERING -->
        <div class="module-row" style="margin-bottom:0;">
            <section class="module final-chain" style="display:flex; align-items:center; justify-content:space-between;">
                <div class="module-title">8 & 12. FINAL CHAIN & LIMITER</div>
                <div style="display:flex; align-items:center; gap:40px; margin: 0 auto;">
                    <div class="knob-container"><div class="knob-pro mini"></div><label>FINAL COMP</label></div>
                    <div class="knob-container"><div class="knob-pro large"></div><label>-10 LUFS LIMIT</label></div>
                    <div class="meter-group" style="display:flex; gap:5px;">
                        <div class="led-meter-v" style="height:150px; width:20px;"><div class="led-bar" style="height: 85%;"></div></div>
                        <div class="led-meter-v" style="height:150px; width:20px;"><div class="led-bar" style="height: 85%;"></div></div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
