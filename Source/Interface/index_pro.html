<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NADA BOSS GIGA-RACK 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #labels-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        .bebas { font-family: 'Bebas Neue', sans-serif; color: #fff; }
        .branding { position: absolute; top: 40px; left: 40px; }
        .spec { position: absolute; top: 40px; right: 40px; text-align: right; }
        .label-v { font-size: 10px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="labels-overlay">
        <div class="branding">
            <h1 class="bebas" style="font-size: 64px; margin: 0; letter-spacing: -3px;">NADA AUDIO</h1>
            <span class="label-v">ULTIMATE 3D HARDWARE SUITE // 14-STAGES</span>
        </div>
        <div class="spec">
            <h1 class="bebas" style="font-size: 64px; margin: 0; color: #222;">VST3</h1>
            <span class="label-v" style="color: #ff3c3c;">HYPER-NET WEBGL ENGINE</span>
        </div>
    </div>
    <script src="three_ui.js"></script>
</body>
</html>
