<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NADA BOSS GIGA-RACK 3D</title>
    <!-- THREE.JS CORE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; cursor: crosshair; }
        
        #rack-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }

        /* OVERLAY LABELS (Vector Sharp) */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box;
        }

        .bebas { font-family: 'Bebas Neue', sans-serif; color: #fff; line-height: 0.8; }
        .branding h1 { font-size: 80px; margin: 0; letter-spacing: -4px; text-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .branding span { font-size: 12px; color: #555; letter-spacing: 3px; font-weight: 900; }

        .vst-meta { text-align: right; }
        .vst-meta h1 { font-size: 80px; margin: 0; color: #222; }
        .vst-meta span { font-size: 12px; color: #ff3c3c; letter-spacing: 3px; font-weight: 900; }

        .module-label {
            position: absolute; font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: #666; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="rack-container"></div>

    <div class="overlay">
        <div class="branding">
            <h1 class="bebas">NADA AUDIO</h1>
            <span>PRO-VOCALIST SUITE // 14-STAGE 3D RACK</span>
        </div>
        <div class="vst-meta">
            <h1 class="bebas">VST3</h1>
            <span>HYPER-NET RESOLUTION // 4K 3D ENGINE</span>
        </div>
    </div>

    <!-- MODULE IDENTIFIERS -->
    <div class="module-label" style="top: 25%; left: 15%;">01. AUTOTUNE ELITE</div>
    <div class="module-label" style="top: 25%; left: 38%;">02. REDUCTIVE EQ</div>
    <div class="module-label" style="top: 25%; left: 52%;">03. 1176 FET COMP</div>
    <div class="module-label" style="top: 25%; left: 78%;">04. LA-2A OPTO</div>

    <script src="three_ui.js"></script>
</body>
</html>
