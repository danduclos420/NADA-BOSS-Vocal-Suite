<!-- Fresh file to bypass cache -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-industrial: #1c1d20;
            --neon-red: #ff3c3c;
            --red-glow: 0 0 15px rgba(255, 60, 60, 0.8);
            --gold-main: #ffd700;
        }

        body {
            background: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #e0e0e0;
        }

        .plugin-container {
            width: 700px;
            height: 700px;
            background: var(--bg-industrial);
            background-image: 
                radial-gradient(circle at 50% 50%, #2a2b30 0%, #121315 100%),
                url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 3px solid #111;
            border-radius: 12px;
            box-shadow: 0 50px 150px rgba(0,0,0,1);
            position: relative;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* SCREWS */
        .screw { width: 14px; height: 14px; background: radial-gradient(circle at 30% 30%, #555, #111); border-radius: 50%; position: absolute; box-shadow: 1px 1px 2px #000; }
        .screw::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #222; transform: translateY(-50%) rotate(45deg); }
        .sl { top: 15px; left: 15px; } .sr { top: 15px; right: 15px; }
        .bl { bottom: 15px; left: 15px; } .br { bottom: 15px; right: 15px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }

        /* THE CIRCULAR AI GOLD BUTTON */
        .ai-center { position: relative; width: 150px; height: 150px; }
        .ai-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; border-radius: 50%;
            background: radial-gradient(circle, var(--gold-main) 0%, transparent 70%);
            filter: blur(25px); opacity: 0.8; animation: pulse 1s infinite alternate;
        }
        .ai-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 110px; height: 110px;
            background: radial-gradient(circle, #333 0%, #000 100%);
            border: 4px solid #222; border-radius: 50%;
            box-shadow: 0 10px 30px #000, inset 0 2px 10px rgba(255,255,255,0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .ai-btn h3 { color: var(--gold-main); font-size: 32px; margin: 0; font-family: 'Bebas Neue', sans-serif; text-shadow: 0 0 15px rgba(255,215,0,0.6); }

        /* HARDWARE MODULES */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mod { background: rgba(0,0,0,0.4); border: 1px solid #333; border-radius: 10px; padding: 20px; position: relative; }
        .mod-h { position: absolute; top: -12px; left: 15px; background: #1c1d20; padding: 0 8px; font-size: 14px; color: #666; font-family: 'Bebas Neue', sans-serif; }

        /* KNOBS */
        .knob { width: 80px; height: 80px; background: conic-gradient(from 0deg, #111, #444, #111, #444, #111); border-radius: 50%; border: 3px solid #000; position: relative; box-shadow: 0 8px 15px #000; }
        .knob.xl { width: 120px; height: 120px; }
        .knob .ind { position: absolute; top: 8px; left: 50%; width: 4px; height: 20px; background: var(--neon-red); transform: translateX(-50%); box-shadow: var(--red-glow); }

        /* METERS */
        .meter { width: 20px; height: 140px; background: #050505; border: 1px solid #222; position: relative; background-image: linear-gradient(to top, transparent 96%, #000 96%); background-size: 100% 5px; }
        .fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #800, #f00); height: 60%; box-shadow: 0 0 15px rgba(255,0,0,0.5); }

        @keyframes pulse { to { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); } }
    </style>
    <title>NADA BOSS PRO</title>
</head>
<body>
    <div class="plugin-container">
        <div class="screw sl"></div><div class="screw sr"></div>
        <div class="screw bl"></div><div class="screw br"></div>

        <header class="header">
            <div><h1 class="bebas" style="font-size: 40px; margin:0;">NADA AUDIO</h1><p class="bebas" style="color:#555; margin:0;">PRO-VOCALIST SUITE</p></div>
            <div class="ai-center">
                <div class="ai-glow"></div>
                <div class="ai-btn"><h3>NADA AI</h3></div>
            </div>
            <div style="text-align: right;"><h1 class="bebas" style="font-size: 40px; margin:0;">VST3</h1><p class="bebas" style="color:#555; margin:0;">4K RESOLUTION</p></div>
        </header>

        <div class="grid">
            <section class="mod">
                <div class="mod-h">AUTOTUNE</div>
                <div style="display:flex; align-items:center; justify-content:space-around;">
                    <div class="meter"><div class="fill"></div></div>
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <div class="knob"><div class="ind"></div></div>
                        <label class="bebas">PITCH</label>
                    </div>
                    <div class="meter"><div class="fill" style="height:30%"></div></div>
                </div>
            </section>
            <section class="mod">
                <div class="mod-h">OPTO COMPRESSOR</div>
                <div style="display:flex; align-items:center; justify-content:space-around;">
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <div class="knob xl"><div class="ind"></div></div>
                        <label class="bebas">PEAK RED.</label>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
